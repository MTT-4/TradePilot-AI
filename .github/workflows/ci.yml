name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_URL: http://localhost:3100
  TRACKING_BASE_URL: http://localhost:3100/t
  DATABASE_URL: postgresql://tradepilot:tradepilot@127.0.0.1:5432/tradepilot
  REDIS_URL: redis://127.0.0.1:6379
  S3_ENDPOINT: http://127.0.0.1:9000
  S3_BUCKET: tradepilot-local
  S3_ACCESS_KEY: tradepilot
  S3_SECRET_KEY: tradepilot-local-secret
  AUTH_SECRET: ci-auth-secret
  INBOUND_EMAIL_WEBHOOK_SECRET: ci-webhook-secret
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_API_KEY: ci-openai-key
  OPENAI_MODEL: gpt-4.1-mini
  GOOGLE_TRANSLATE_BASE_URL: https://translation.googleapis.com/language/translate/v2
  GOOGLE_TRANSLATE_KEY: ci-google-key
  LOCAL_QWEN_BASE_URL: https://mock.local-qwen.test/v1
  LOCAL_QWEN_MODEL: qwen-mock
  LOCAL_BGE_BASE_URL: https://mock.local-bge.test/v1
  LOCAL_BGE_MODEL: bge-mock

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: tradepilot
          POSTGRES_USER: tradepilot
          POSTGRES_PASSWORD: tradepilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tradepilot -d tradepilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start MinIO
        run: |
          docker run -d \
            --name tradepilot-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=${S3_ACCESS_KEY} \
            -e MINIO_ROOT_PASSWORD=${S3_SECRET_KEY} \
            minio/minio:RELEASE.2025-04-22T22-12-26Z \
            server /data --address ":9000"

      - name: Write CI env file
        run: |
          cat <<EOF > .env
          APP_URL=${APP_URL}
          TRACKING_BASE_URL=${TRACKING_BASE_URL}
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          S3_ENDPOINT=${S3_ENDPOINT}
          S3_BUCKET=${S3_BUCKET}
          S3_ACCESS_KEY=${S3_ACCESS_KEY}
          S3_SECRET_KEY=${S3_SECRET_KEY}
          AUTH_SECRET=${AUTH_SECRET}
          INBOUND_EMAIL_WEBHOOK_SECRET=${INBOUND_EMAIL_WEBHOOK_SECRET}
          OPENAI_BASE_URL=${OPENAI_BASE_URL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=${OPENAI_MODEL}
          GOOGLE_TRANSLATE_BASE_URL=${GOOGLE_TRANSLATE_BASE_URL}
          GOOGLE_TRANSLATE_KEY=${GOOGLE_TRANSLATE_KEY}
          LOCAL_QWEN_BASE_URL=${LOCAL_QWEN_BASE_URL}
          LOCAL_QWEN_MODEL=${LOCAL_QWEN_MODEL}
          LOCAL_BGE_BASE_URL=${LOCAL_BGE_BASE_URL}
          LOCAL_BGE_MODEL=${LOCAL_BGE_MODEL}
          EOF

      - name: Wait for MinIO
        run: |
          for attempt in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run secret source check
        run: npm run ops:check-secrets

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Redline tests
        run: npm run test:redline

      - name: Full unit and integration tests
        run: npm run test

  closed-loop:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: tradepilot
          POSTGRES_USER: tradepilot
          POSTGRES_PASSWORD: tradepilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tradepilot -d tradepilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start MinIO
        run: |
          docker run -d \
            --name tradepilot-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=${S3_ACCESS_KEY} \
            -e MINIO_ROOT_PASSWORD=${S3_SECRET_KEY} \
            minio/minio:RELEASE.2025-04-22T22-12-26Z \
            server /data --address ":9000"

      - name: Write CI env file
        run: |
          cat <<EOF > .env
          APP_URL=${APP_URL}
          TRACKING_BASE_URL=${TRACKING_BASE_URL}
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          S3_ENDPOINT=${S3_ENDPOINT}
          S3_BUCKET=${S3_BUCKET}
          S3_ACCESS_KEY=${S3_ACCESS_KEY}
          S3_SECRET_KEY=${S3_SECRET_KEY}
          AUTH_SECRET=${AUTH_SECRET}
          INBOUND_EMAIL_WEBHOOK_SECRET=${INBOUND_EMAIL_WEBHOOK_SECRET}
          OPENAI_BASE_URL=${OPENAI_BASE_URL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=${OPENAI_MODEL}
          GOOGLE_TRANSLATE_BASE_URL=${GOOGLE_TRANSLATE_BASE_URL}
          GOOGLE_TRANSLATE_KEY=${GOOGLE_TRANSLATE_KEY}
          LOCAL_QWEN_BASE_URL=${LOCAL_QWEN_BASE_URL}
          LOCAL_QWEN_MODEL=${LOCAL_QWEN_MODEL}
          LOCAL_BGE_BASE_URL=${LOCAL_BGE_BASE_URL}
          LOCAL_BGE_MODEL=${LOCAL_BGE_MODEL}
          EOF

      - name: Wait for MinIO
        run: |
          for attempt in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run secret source check
        run: npm run ops:check-secrets

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Run 18-step closed loop acceptance
        run: npm run test:closed-loop
